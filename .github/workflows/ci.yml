name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "15 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Quality gates (run in parallel)
  # ──────────────────────────────────────────────

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Setup dependencies
        run: make setup
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - name: Run tests
        run: make test
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  e2e:
    if: github.event_name != 'schedule' && github.repository == 'runpod/runpod-python'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[test]" --quiet || uv pip install -e .
          uv pip install runpod-flash pytest pytest-asyncio pytest-timeout pytest-rerunfailures httpx
          uv pip install -e . --reinstall --no-deps
          python -c "import runpod; print(f'runpod: {runpod.__version__} from {runpod.__file__}')"

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          pytest tests/e2e/ -v -p no:xdist --timeout=600 --reruns 1 --reruns-delay 5 --log-cli-level=INFO -o "addopts="
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_SDK_GIT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  codeql:
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ──────────────────────────────────────────────
  # Validation gate
  # ──────────────────────────────────────────────

  validation:
    runs-on: ubuntu-latest
    needs: [test, e2e, codeql]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results=("${{ needs.test.result }}" "${{ needs.e2e.result }}" "${{ needs.codeql.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more quality checks failed (got: $result)"
              exit 1
            fi
          done
