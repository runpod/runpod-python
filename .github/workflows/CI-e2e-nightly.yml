name: CI-e2e-nightly
on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[test]" 2>/dev/null || uv pip install -e .
          uv pip install runpod-flash pytest pytest-asyncio pytest-timeout pytest-rerunfailures httpx
          uv pip install -e . --reinstall --no-deps
          python -c "import runpod; print(f'runpod: {runpod.__version__} from {runpod.__file__}')"

      - name: Run full e2e tests
        run: |
          source .venv/bin/activate
          pytest tests/e2e/ -v -p no:xdist --timeout=180 --reruns 1 --reruns-delay 5 --log-cli-level=INFO -o "addopts="
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_SDK_GIT_REF: ${{ github.ref_name }}

      - name: Cleanup flash resources
        if: always()
        run: |
          source .venv/bin/activate
          pkill -f "flash run" || true
          cd tests/e2e/fixtures/all_in_one
          flash undeploy --force 2>/dev/null || true
