name: CD

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish without release-please"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Staging: TestPyPI
  # ──────────────────────────────────────────────

  test-publish:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: test-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11.10
        run: uv python install 3.11.10

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ──────────────────────────────────────────────
  # Production: Release + PyPI + Worker notifications
  # ──────────────────────────────────────────────

  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v3
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          package-name: runpod

  pypi-publish:
    name: PyPI Publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created || (github.event_name == 'workflow_dispatch' && inputs.force_publish == 'true') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi-production
      url: https://pypi.org/project/runpod/
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11.10
        run: uv python install 3.11.10

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build and verify package
        run: make verify

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

